openapi: 3.0.3
info:
  title: Todo API
  version: 1.0.0
  description: Simple Todo API — API-First demo

servers:
  - url: http://localhost:8080

tags:
  - name: Todo

paths:
  /todos:
    get:
      operationId: getTodos
      summary: List all todos
      tags: [Todo]
      responses:
        '200':
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createTodo
      summary: Create a todo
      tags: [Todo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
      responses:
        '201':
          description: Created todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: Validation error (e.g. title is required, priority out of range)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /todos/{id}:
    get:
      operationId: getTodoById
      summary: Get a todo by id
      tags: [Todo]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: Invalid id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateTodo
      summary: Update a todo
      tags: [Todo]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
      responses:
        '200':
          description: Updated todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: Validation error (e.g. title is required, priority out of range)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteTodo
      summary: Delete a todo
      tags: [Todo]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Deleted successfully
        '400':
          description: Invalid id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Todo:
      type: object
      required: [id, title, completed]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: Buy milk
        completed:
          type: boolean
          example: false
        priority:
          type: integer
          minimum: 1
          maximum: 5
          example: 3
          description: Priority level 1 (low) to 5 (high)

    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Buy milk
        priority:
          type: integer
          minimum: 1
          maximum: 5
          example: 3

    UpdateTodoRequest:
      type: object
      required: [title, completed]
      properties:
        title:
          type: string
          example: Buy milk
        completed:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
          description: Machine-readable error code
        message:
          type: string
          example: title is required
          description: Human-readable error message
